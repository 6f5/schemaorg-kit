title: schemaorg-kit
description: >-
  Type-safe schema.org structured data for every Google rich result type.
  Build JSON-LD with Zod validation, full TypeScript inference, and @graph support.

theme: just-the-docs

plugins:
  - jekyll-seo-tag

# Site settings
url: "" # set to your GitHub Pages URL, e.g. https://your-org.github.io
baseurl: "/schemaorg-kit" # set to your repo name

# Theme color
color_scheme: light

# Logo and favicon
# logo: "/assets/logo.png"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links (top-right nav)
aux_links:
  "npm":
    - "https://www.npmjs.com/package/schemaorg-kit"
  "GitHub":
    - "https://github.com/your-org/schemaorg-kit"

aux_links_new_tab: true

# Footer
footer_content: >-
  Copyright &copy; 2025 schemaorg-kit contributors. Distributed under the
  <a href="https://github.com/your-org/schemaorg-kit/blob/main/LICENSE">MIT license.</a>

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchors
heading_anchors: true

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: red

# Collections
collections:
  guides:
    permalink: "/:collection/:path/"
    output: true
  advanced:
    permalink: "/:collection/:path/"
    output: true

# Exclude from build
exclude:
  - node_modules/
  - vendor/
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
